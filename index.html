<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <div class="card">
      <div class="expression">
        <div class="number">
          <p>60</p>
          <p>+</p>
          <p>20%</p>
        </div>
      </div>
      <div class="row">
        <div class="items">
          <p>AC</p>
        </div>
        <div class="items">
          <p>DEL</p>
        </div>
        <div class="items">
          <p><i class="fa-regular fa-percent"></i></p>
        </div>
        <div class="items">
          <p><i class="fa-solid fa-divide"></i></p>
        </div>
      </div>
      <div class="row">
        <div class="items">
            <p>7</p>
        </div>
        <div class="items">
            <p>8</p>
        </div>
        <div class="items">
            <p>9</p>
        </div>
        <div class="items">
            <p><i class="fa-solid fa-xmark"></i></p>
        </div>
      </div>
      <div class="row">
        <div class="items">
            <p>4</p>
        </div>
        <div class="items">
            <p>5</p>
        </div>
        <div class="items">
            <p>6</p>
        </div>
        <div class="items">
            <p><i class="fa-solid fa-minus"></i></p>
        </div>
      </div>
      <div class="row">
        <div class="items">
            <p>1</p>
        </div>
        <div class="items">
            <p>2</p>
        </div>
        <div class="items">
            <p>3</p>
        </div>
        <div class="items">
            <p><i class="fa-solid fa-plus"></i></p>
        </div>
      </div>
      <div class="row">
        <div class="items">
            <p>0</p>
        </div>
        <div class="items">
            <p>00</p>
        </div>
        <div class="items">
            <p>.</p>
        </div>
        <div class="items">
            <p><i class="fa-solid fa-equals"></i></p>
        </div>
      </div>
    </div>
  </body>
</html>
